<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RepoWiki</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      background: #fff;
    }
    #header {
      padding: 14px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .title-row { display: flex; align-items: center; gap: 7px; }
    .logo {
      width: 22px; height: 22px;
      background: #0f172a; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: white; font-weight: 700; flex-shrink: 0;
    }
    .title { font-size: 14px; font-weight: 700; color: #0f172a; }
    #repo-chip {
      font-size: 10px; color: #64748b;
      background: #f1f5f9; border-radius: 20px;
      padding: 3px 8px; border: 1px solid #e2e8f0;
      max-width: 110px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    #pinned-btn {
      margin: 0 12px 14px;
      display: flex; align-items: center; gap: 10px;
      background: #0f172a; border-radius: 10px;
      padding: 12px 14px; cursor: pointer;
    }
    .pinned-name { font-size: 13px; font-weight: 600; color: white; flex: 1; }
    .pinned-sub { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 1px; }
    .open-icon { font-size: 15px; color: rgba(255,255,255,.6); }
    .divider { height: 1px; background: #f1f5f9; margin: 0 12px 10px; }
    #providers-section { padding: 0 12px 14px; }
    .section-label {
      font-size: 10px; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px;
    }
    .provider-row {
      display: flex; align-items: center;
      padding: 5px 6px; border-radius: 7px; gap: 8px;
    }
    .provider-row:hover { background: #f8fafc; }
    .p-name { font-size: 12px; color: #374151; flex: 1; font-weight: 500; }
    .toggle {
      width: 28px; height: 16px;
      background: #e2e8f0; border-radius: 8px;
      position: relative; cursor: pointer; flex-shrink: 0;
    }
    .toggle.on { background: #0f172a; }
    .toggle::after {
      content: '';
      position: absolute; top: 2px; left: 2px;
      width: 12px; height: 12px;
      background: white; border-radius: 50%;
      transition: left .15s;
    }
    .toggle.on::after { left: 14px; }

    /* Add custom provider row */
    .add-row {
      display: flex; align-items: center;
      padding: 5px 6px; border-radius: 7px; gap: 6px;
      cursor: pointer; color: #94a3b8;
    }
    .add-row:hover { background: #f8fafc; }
    .add-icon { font-size: 16px; font-weight: 300; }
    .add-text { font-size: 12px; font-weight: 500; }

    /* Inline add form */
    .add-form {
      margin: 4px 0 0; padding: 10px 12px;
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    }
    .add-form-label {
      font-size: 11px; font-weight: 600; color: #475569; margin-bottom: 8px;
    }
    .add-form input {
      width: 100%; padding: 6px 8px;
      border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 12px; background: white; outline: none;
      box-sizing: border-box; margin-bottom: 6px;
      font-family: inherit;
    }
    .add-form input.mono { font-family: monospace; }
    .add-form-error {
      font-size: 11px; color: #ef4444; margin-bottom: 6px; display: none;
    }
    .add-form-actions {
      display: flex; gap: 6px; justify-content: flex-end;
    }
    .add-form-actions button {
      padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
    }
    .btn-cancel {
      border: 1px solid #e2e8f0; background: white; color: #64748b;
    }
    .btn-add {
      border: none; background: #0f172a; color: white;
    }
    .btn-add:disabled {
      opacity: 0.4; cursor: not-allowed;
    }

    /* Delete button for custom providers */
    .delete-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 4px;
      border: none; background: transparent; cursor: pointer;
      color: #94a3b8; font-size: 13px; padding: 0; flex-shrink: 0;
    }
    .delete-btn:hover { background: #fee2e2; color: #ef4444; }
  </style>
</head>
<body>
  <div id="header">
    <div class="title-row">
      <div class="logo">R</div>
      <span class="title">RepoWiki</span>
    </div>
    <span id="repo-chip" style="display:none"></span>
  </div>

  <div id="pinned-btn"></div>

  <div class="divider"></div>

  <div id="providers-section"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
