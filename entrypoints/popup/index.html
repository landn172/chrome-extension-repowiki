<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RepoWiki</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 12px;
      color: #24292f;
    }
    h3 {
      font-size: 13px;
      margin: 0 0 8px;
      color: #24292f;
    }
    #not-repo-msg,
    #all-disabled-msg {
      font-size: 12px;
      color: #57606a;
      display: none;
    }
    .provider-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .provider-name {
      font-size: 13px;
      color: #24292f;
    }
    .open-link {
      font-size: 12px;
      color: #0969da;
      text-decoration: none;
    }
    .open-link:hover {
      text-decoration: underline;
    }
    hr {
      border: none;
      border-top: 1px solid #d0d7de;
      margin: 12px 0;
    }
    #settings-section label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #24292f;
      margin-bottom: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>RepoWiki</h2>

  <div id="links-section"></div>
  <p id="not-repo-msg">Not a GitHub repo page.</p>
  <p id="all-disabled-msg">No providers enabled.</p>

  <hr>

  <div id="settings-section">
    <h3>Settings</h3>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
