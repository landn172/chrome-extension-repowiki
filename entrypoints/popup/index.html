<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeepWiki</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 12px;
      color: #24292f;
    }
    #url-display {
      font-size: 12px;
      color: #57606a;
      word-break: break-all;
      margin-bottom: 12px;
      min-height: 16px;
    }
    #open-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: #0969da;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }
    #open-btn:disabled {
      background: #8c959f;
      cursor: not-allowed;
    }
    #not-repo-msg {
      font-size: 12px;
      color: #57606a;
      display: none;
    }
  </style>
</head>
<body>
  <h2>DeepWiki</h2>
  <div id="url-display" aria-live="polite"></div>
  <p id="not-repo-msg">Not a GitHub repo page.</p>
  <button id="open-btn" disabled>Open in DeepWiki</button>
  <script type="module" src="./main.ts"></script>
</body>
</html>
